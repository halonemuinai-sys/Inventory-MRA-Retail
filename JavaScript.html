<script>
    // --- INITIALIZATION ---


    let inventoryData = [], otherDeviceData = [], employeeData = [], masterData = [], configData = [], costAnalysisData = {}, mobileCostAnalysisData = {}, gisLocations = [];
    let activeCompany = 'Global';
    let selectedGlobalYear = new Date().getFullYear();
    let chartInstanceCombined = null;
    let chartInstanceCostAnalysis = null;
    let chartInstanceMobileCost = null;
    let currentUser = null;

    // Auto-login check
    window.onload = function () {
        checkAuth();
    };

    function checkAuth() {
        const storedUser = localStorage.getItem('app_user');
        if (storedUser) {
            try {
                currentUser = JSON.parse(storedUser);
                // Update UI immediately
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                updateSidebarUser();
                applyPermissions(currentUser.role);
                refreshData();
            } catch (e) {
                console.error("Auth Error", e);
                localStorage.removeItem('app_user');
            }
        }
    }

    function handleLogin(e) {
        e.preventDefault();
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        const btn = document.getElementById('btn-login');
        const err = document.getElementById('login-error');

        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses...';
        btn.disabled = true;
        err.classList.add('hidden');

        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('app_user', JSON.stringify(currentUser));

                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');

                updateSidebarUser();
                applyPermissions(currentUser.role);
                refreshData();
            } else {
                err.innerText = res.message;
                err.classList.remove('hidden');
                btn.innerHTML = '<span>Masuk Sistem</span><i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform text-xs"></i>';
                btn.disabled = false;
            }
        }).apiLogin(u, p);
    }

    function handleLogout() {
        if (confirm("Keluar dari aplikasi?")) {
            localStorage.removeItem('app_user');
            currentUser = null;
            document.getElementById('app-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            // Reset Login Form
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<span>Masuk Sistem</span><i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform text-xs"></i>';
            btn.disabled = false;
        }
    }

    function updateSidebarUser() {
        if (!currentUser) return;
        document.getElementById('sidebar-user-name').innerText = currentUser.name;
        document.getElementById('sidebar-user-role').innerText = currentUser.role.toUpperCase();
        document.getElementById('sidebar-user-initial').innerText = currentUser.name.charAt(0).toUpperCase();
    }

    function applyPermissions(role) {
        const _id = (id) => document.getElementById(id);
        const hide = (id) => { if (_id(id)) _id(id).classList.add('hidden'); };
        const show = (id) => { if (_id(id)) _id(id).classList.remove('hidden'); };

        // 1. Tampilkan semua default (agar bersih saat pindah akun)
        const allElements = [
            'nav-bulk-import', 'nav-employees', 'nav-budgeting', 'nav-company-budget-view', 
            'nav-cost', 'nav-config', 'head-admin', 'head-legacy-helpdesk', 'nav-ticket-support',
            'nav-ticket-summary', 'head-it-helpdesk', 'nav-helpdesk-input', 'nav-helpdesk-list',
            'nav-helpdesk-dashboard', 'nav-helpdesk-report', 'nav-saas', 'nav-network-sla',
            'nav-mobile-summary'
        ];
        allElements.forEach(show);

        const r = (role || '').toUpperCase().trim();

        // 2. Sembunyikan sesuai peran
        if (r === 'IT SUPPORT') {
            hide('nav-bulk-import');
            hide('nav-employees');
            hide('nav-budgeting');
            hide('nav-company-budget-view');
            hide('head-admin');
            hide('nav-config');
            hide('nav-saas');
        } else if (r === 'DATA ENTRY') {
            hide('head-legacy-helpdesk');
            hide('nav-ticket-support');
            hide('nav-ticket-summary');
            hide('head-it-helpdesk');
            hide('nav-helpdesk-input');
            hide('nav-helpdesk-list');
            hide('nav-helpdesk-dashboard');
            hide('nav-helpdesk-report');
            hide('nav-budgeting');
            hide('nav-company-budget-view');
            hide('nav-cost');
            hide('nav-cost');
            hide('head-admin');
            hide('nav-config');
            hide('nav-saas');
        }
    }

    function refreshData() {
        showLoading(true);
        google.script.run.withSuccessHandler(data => {
            // Destructure data
            masterData = data.masterData;
            window.usersData = data.users;
            inventoryData = data.inventory;
            otherDeviceData = data.otherDevices || [];
            employeeData = data.employees;
            configData = data.config;
            costAnalysisData = data.costAnalysis;
            mobileCostAnalysisData = data.costAnalysisMobile || {};
            window.saasData = data.saas || [];
            window.networkContractsData = data.networkContracts || [];
            window.networkSLAsCached = data.networkSLAs || [];
            window.networkContractsCached = data.networkContracts || [];
            gisLocations = data.gisLocations || [];
            if (typeof initGISLogic === 'function') initGISLogic(gisLocations);

            // Render UI
            renderConfiguration();
            populateMasterDropdowns();
            populateTicketReporters(); // In TicketJS or logic
            loadConfigValues();
            populateYearDropdown('dash-year-select');
            populateYearDropdown('cost-year-select');
            populateYearDropdown('rental-year');
            populateYearDropdown('cb-year-select');
            populateYearDropdown('hd-report-year');
            populateYearDropdown('mobile-year-select');
            populateCompanySelector();
            if (typeof initOnboardingForm === 'function') initOnboardingForm();

            renderRentalReport();

            // Initialize Ticket List & Badge
            if (typeof loadTickets === 'function') loadTickets();

            updateDashboard();
            // renderCombinedChart(); // This function is not present in the original code, removing to avoid error
            // renderAssetHistory('all', 'asset-history-list'); // This function is not present in the original code, removing to avoid error
            renderInventoryTable();
            renderOtherDeviceTable();
            renderEmployeeTable();
            renderCostTable();
            renderBudgetTable();
            if(typeof renderRentalSpecTable === 'function') renderRentalSpecTable();
            if(typeof renderCompanyBudgetTable === 'function') renderCompanyBudgetTable();

            // Helpdesk Ticketing System
            if (typeof helpdeskTickets !== 'undefined') {
                helpdeskTickets = data.helpdeskTickets || [];
                if (typeof updateHelpdeskBadge === 'function') updateHelpdeskBadge();
                if (typeof initHelpdeskForm === 'function') initHelpdeskForm();
                if (typeof populateHelpdeskDropdowns === 'function') populateHelpdeskDropdowns();
            }
            if (typeof initSaaS === 'function') initSaaS();
            if (typeof initNetworkSLA === 'function') initNetworkSLA();
            if (typeof renderMobileCostTable === 'function') renderMobileCostTable();

            showLoading(false);
        }).apiGetAllData(selectedGlobalYear);
    }

    function renderBudgetTable() {
        const tbody = document.getElementById('budget-table-body');
        if (!tbody) return;
        tbody.innerHTML = '';

        const filteredEmps = employeeData.filter(e => activeCompany === 'Global' || e.company === activeCompany);

        let totalBudget = 0;
        let totalUsed = 0;

        filteredEmps.forEach(emp => {
            const asset = emp.assignedAssetId ? inventoryData.find(i => i.id == emp.assignedAssetId) : null;
            const currentCost = asset && asset.type === 'Sewa' ? (parseInt(asset.rentalCost) || 0) : 0;
            const budget = parseInt(emp.budget) || 0;

            totalBudget += budget;
            totalUsed += currentCost;

            const remaining = budget - currentCost;
            let remainingClass = remaining < 0 ? 'text-red-600 font-bold' : 'text-emerald-600 font-bold';
            if (budget === 0) remainingClass = 'text-slate-400'; // No budget set

            let statusBadge = '<span class="text-xs text-slate-400 font-bold">N/A</span>';
            let barColor = 'bg-slate-200';
            let percent = 0;

            if (budget > 0) {
                percent = Math.min((currentCost / budget) * 100, 100);
                if (currentCost > budget) {
                    statusBadge = '<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold">Over</span>';
                    barColor = 'bg-red-500';
                } else {
                    statusBadge = '<span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs font-bold">Safe</span>';
                    barColor = 'bg-green-500';
                }
            } else if (currentCost > 0) {
                statusBadge = '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-xs font-bold">Unset</span>';
                barColor = 'bg-yellow-500';
                percent = 100;
            }

            const budgetFormatted = budget > 0 ? budget.toLocaleString('id-ID') : '';
            const remainingFormatted = budget > 0 ? (remaining < 0 ? '- ' : '') + 'Rp ' + Math.abs(remaining).toLocaleString('id-ID') : '-';

            const row = `<tr class="hover:bg-slate-50 border-b border-slate-50"><td class="px-6 py-4"><div class="font-bold text-sm text-slate-800">${emp.name}</div><div class="text-xs text-slate-500">${emp.role}</div></td><td class="px-6 py-4"><div class="text-xs text-slate-700">${asset ? asset.brand + ' ' + asset.model : '-'}</div></td><td class="px-6 py-4 text-right text-xs font-mono">${currentCost > 0 ? 'Rp ' + currentCost.toLocaleString('id-ID') : '-'}</td><td class="px-6 py-4 text-right"><input type="text" value="${budgetFormatted}" class="w-28 p-1 text-right text-xs border border-slate-300 rounded focus:border-brand-500 outline-none" onkeyup="formatCurrency(this)" onchange="updateEmployeeBudget('${emp.id}', this.value)" placeholder="Set Budget"></td><td class="px-6 py-4 text-right text-xs font-mono ${remainingClass}">${remainingFormatted}</td><td class="px-6 py-4"><div class="flex items-center gap-2"><div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="${barColor} h-full" style="width: ${percent}%"></div></div>${statusBadge}</div></td><td class="px-6 py-4 text-right"><button class="text-slate-400 hover:text-brand-600" onclick="editEmployee('${emp.id}')"><i class="fa-solid fa-pen-to-square"></i></button></td></tr>`;
            tbody.innerHTML += row;
        });

        // Update Summary Cards
        document.getElementById('budget-total-limit').innerText = 'Rp ' + totalBudget.toLocaleString('id-ID');
        document.getElementById('budget-total-used').innerText = 'Rp ' + totalUsed.toLocaleString('id-ID');
        const totalRemaining = totalBudget - totalUsed;
        const totalRemainingEl = document.getElementById('budget-total-remaining');
        totalRemainingEl.innerText = (totalRemaining < 0 ? '- ' : '') + 'Rp ' + Math.abs(totalRemaining).toLocaleString('id-ID');
        totalRemainingEl.className = totalRemaining < 0 ? 'text-xl font-bold text-red-600' : 'text-xl font-bold text-emerald-700';
    }
    function updateEmployeeBudget(empId, value) {
        const emp = employeeData.find(e => e.id == empId);
        if (!emp) return;

        // Remove dots for parsing
        const cleanValue = value ? parseInt(value.replace(/\./g, '')) : 0;

        emp.budget = cleanValue;
        const dataToUpdate = { id: empId, budget: cleanValue };

        google.script.run.withSuccessHandler((res) => {
            if (res.success) {
                renderBudgetTable();
            } else {
                alert("Gagal menyimpan budget.");
            }
        }).apiUpdateEmployee(dataToUpdate);
    }

    function exportBudgetReport() {
        const rows = [['Nama Karyawan', 'Role', 'Departemen', 'Aset', 'Serial Number', 'Biaya Sewa', 'Budget Limit', 'Sisa Budget', 'Status']];
        const filteredEmps = employeeData.filter(e => activeCompany === 'Global' || e.company === activeCompany);

        filteredEmps.forEach(emp => {
            const asset = emp.assignedAssetId ? inventoryData.find(i => i.id == emp.assignedAssetId) : null;
            const currentCost = asset && asset.type === 'Sewa' ? (parseInt(asset.rentalCost) || 0) : 0;
            const budget = parseInt(emp.budget) || 0;
            const remaining = budget - currentCost;

            let status = 'N/A';
            if (budget > 0) {
                status = currentCost > budget ? 'Over Budget' : 'Safe';
            } else if (currentCost > 0) {
                status = 'No Budget Set';
            }

            rows.push([
                `"${emp.name}"`,
                `"${emp.role}"`,
                `"${emp.department}"`,
                `"${asset ? asset.brand + ' ' + asset.model : '-'}"`,
                `"${asset ? asset.serial : '-'}"`,
                currentCost,
                budget,
                remaining,
                status
            ]);
        });

        let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Budget_Report_${activeCompany}_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
    function populateYearDropdown(elementId) {
        const sel = document.getElementById(elementId);
        if (!sel) return;
        sel.innerHTML = '';
        const current = new Date().getFullYear();
        for (let y = current - 2; y <= current + 3; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.text = y;
            if (y === selectedGlobalYear) opt.selected = true;
            sel.appendChild(opt);
        }
    }
    function changeGlobalYear(year) { 
        selectedGlobalYear = parseInt(year); 
        const d1 = document.getElementById('dash-year-select'); 
        const d2 = document.getElementById('cost-year-select'); 
        const d3 = document.getElementById('sla-year-filter');
        const d4 = document.getElementById('mobile-year-select');
        if (d1) d1.value = selectedGlobalYear; 
        if (d2) d2.value = selectedGlobalYear; 
        if (d4) d4.value = selectedGlobalYear;
        if (d3) {
            d3.value = selectedGlobalYear;
            if (typeof renderSLATable === 'function') renderSLATable();
        }
        showLoading(true); 
        google.script.run.withSuccessHandler(costs => { 
            costAnalysisData = costs; 
            updateDashboard(); 
            renderCostTable(); 
            // Also fetch mobile cost analysis
            google.script.run.withSuccessHandler(mobileCosts => {
                mobileCostAnalysisData = mobileCosts || {};
                if (typeof renderMobileCostTable === 'function') renderMobileCostTable();
                showLoading(false); 
            }).withFailureHandler(() => { showLoading(false); }).apiRunMobileCostAnalysis(selectedGlobalYear);
        }).apiRunCostAnalysis(selectedGlobalYear); 
    }
    function changeCostYear(year) { changeGlobalYear(year); }
    function changeMobileYear(year) { changeGlobalYear(year); }
    function handleCompanySwitch(val) {
        activeCompany = val;
        const label = activeCompany === 'Global' ? '(Global)' : `(${activeCompany})`;
        const elSubtitle = document.getElementById('company-subtitle'); if (elSubtitle) elSubtitle.innerText = activeCompany === 'Global' ? 'All Business Units' : activeCompany;
        const elDash = document.getElementById('dash-comp-label'); if (elDash) elDash.innerText = label;
        const elCost = document.getElementById('cost-comp-label'); if (elCost) elCost.innerText = label;
        const elEmp = document.getElementById('emp-list-label'); if (elEmp) elEmp.innerText = label;

        updateDashboard();
        renderInventoryTable();
        renderEmployeeTable();
        renderCostTable();
        renderBudgetTable();
        renderRentalReport(); // Update Rental Report
        if(typeof renderRentalSpecTable === 'function') renderRentalSpecTable();
        if(typeof renderCompanyBudgetTable === 'function') renderCompanyBudgetTable();
        renderMobileDeviceTable();
        if(typeof renderMobileCostTable === 'function') renderMobileCostTable();
        populateCompanySelector();
    }
    function updateDashboard() {
        const inv = inventoryData.filter(i => activeCompany === 'Global' || i.company === activeCompany);
        // emps is defined but was unused in previous snippet, we need it now for lookup
        const emps = employeeData;

        const totalSewa = inv.filter(i => i.type === 'Sewa').length;
        const totalKantor = inv.filter(i => i.type !== 'Sewa').length;

        document.getElementById('dash-total-sewa').innerText = totalSewa;
        document.getElementById('dash-total-kantor').innerText = totalKantor;
        document.getElementById('dash-available').innerText = inv.filter(i => i.status === 'Available').length;
        document.getElementById('dash-tickets').innerText = "0";

        // Calculate New Laptops Rented in Selected Year
        const newLaptopSewa = inv.filter(i => {
           if(i.type !== 'Sewa' || (i.deviceCategory || '').toLowerCase() !== 'laptop' || !i.rentalStart) return false;
           return new Date(i.rentalStart).getFullYear() === selectedGlobalYear;
        }).length;
        const elNewSewa = document.getElementById('dash-new-laptop-sewa');
        if (elNewSewa) elNewSewa.innerText = newLaptopSewa;

        // Calculate YTD Cost from costAnalysisData (match with cost analysis page)
        let totalVal = 0;
        Object.keys(costAnalysisData).forEach(comp => {
            if (activeCompany === 'Global' || comp === activeCompany) {
                totalVal += costAnalysisData[comp].reduce((a, b) => a + b, 0);
            }
        });
        document.getElementById('dash-cost').innerText = "Rp " + totalVal.toLocaleString('id-ID');

        const warningList = document.getElementById('rental-warning-list');
        const warningContainer = document.getElementById('dashboard-rental-container');
        warningList.innerHTML = '';

        const today = new Date();
        let hasWarning = false;
        let warningCount = 0;
        let warningItems = [];

        // Count and collect warnings
        inv.forEach(item => {
            if (item.type === 'Sewa' && item.rentalEnd && item.status !== 'Return to Vendor') {
                const endDate = new Date(item.rentalEnd);
                const diffTime = endDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 30) {
                    hasWarning = true;
                    warningCount++;

                    // Find Employee details
                    const emp = employeeData.find(e => e.assignedAssetId == item.id);
                    const empName = emp ? emp.name : (item.assignedTo || 'Unassigned');
                    const empBudget = emp ? (parseInt(emp.budget) || 0) : 0;
                    const budgetFormatted = empBudget > 0 ? 'Rp ' + empBudget.toLocaleString('id-ID') : 'Rp 0';

                    warningItems.push({ item, diffDays, empName, budgetFormatted });
                }
            }
        });
        // Count and collect Network Contract warnings
        const netContracts = window.networkContractsData || [];
        netContracts.forEach(item => {
            if (item.expiryDate && item.status !== 'Terminated') {
                const endDate = new Date(item.expiryDate);
                const diffTime = endDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 30) {
                    hasWarning = true;
                    warningCount++;
                    warningItems.push({
                        item: { id: item.id, brand: 'ISP: ' + item.provider, model: item.location, serial: item.contractNo, isNetwork: true },
                        diffDays: diffDays,
                        empName: 'Network / ISP',
                        budgetFormatted: 'Rp ' + (parseFloat(item.monthlyCost) || 0).toLocaleString('id-ID')
                    });
                }
            }
        });
        // Count and collect SaaS warnings
        const saas = window.saasData || [];
        saas.forEach(item => {
            if (item.expiryDate && item.status !== 'Cancelled') {
                const endDate = new Date(item.expiryDate);
                const diffTime = endDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays <= 30) {
                    hasWarning = true;
                    warningCount++;
                    warningItems.push({
                        item: { id: item.id, brand: item.category, model: item.name, serial: item.vendor, isSaaS: true },
                        diffDays: diffDays,
                        empName: 'SaaS / System',
                        budgetFormatted: 'Rp ' + (parseFloat(item.cost) || 0).toLocaleString('id-ID')
                    });
                }
            }
        });

        // Update Sidebar Badge
        const badge = document.getElementById('sidebar-warning-badge');
        if (badge) {
            if (warningCount > 0) {
                badge.innerText = warningCount;
                badge.classList.remove('hidden');
                // Pulse animation for better visibility
                badge.classList.add('animate-pulse');
            } else {
                badge.classList.add('hidden');
                badge.classList.remove('animate-pulse');
            }
        }

        if (hasWarning) {
            warningContainer.classList.remove('hidden');

            // Advanced Header inside the list container (or before items)
            // But warningList is a flex container for items. Let's make sure we handle layout.
            // Actually, warningList is likely a flex-row.
            // We can put a header above it? No, warningContainer usually has the header.
            // Let's check Dashboard.html structure first.
            // Assuming warningList is the container for CARDS only.

            warningList.innerHTML = '';
            // Sort by days remaining (urgent first)
            warningItems.sort((a, b) => a.diffDays - b.diffDays).forEach(data => {
                const { item, diffDays, empName, budgetFormatted } = data;
                // Color coding based on urgency
                const urgencyColor = diffDays <= 7 ? 'red' : (diffDays <= 14 ? 'orange' : 'yellow');
                const urgencyBg = diffDays <= 7 ? 'bg-red-50' : (diffDays <= 14 ? 'bg-orange-50' : 'bg-yellow-50');
                const urgencyBorder = diffDays <= 7 ? 'border-red-500' : (diffDays <= 14 ? 'border-orange-500' : 'border-yellow-500');
                const urgencyText = diffDays <= 7 ? 'text-red-700' : (diffDays <= 14 ? 'text-orange-700' : 'text-yellow-700');
                
                let onClickAction = `showSection('inventory'); editInventoryItem('${item.id}');`;
                if (item.isSaaS) onClickAction = `showSection('saas-management'); editSaaS('${item.id}');`;
                if (item.isNetwork) onClickAction = `showSection('network-sla'); switchNetworkSLATab('contract-billing'); editContract('${item.id}');`;

                warningList.innerHTML += `
                        <div class="min-w-[280px] bg-white border border-slate-100 border-l-4 ${urgencyBorder} rounded-xl p-4 shadow-sm relative flex-shrink-0 cursor-pointer hover:bg-slate-50 transition-colors group" onclick="${onClickAction}">
                             <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm truncate max-w-[150px] group-hover:text-brand-600" title="${item.brand} ${item.model}">${item.brand} ${item.model} <i class="fa-solid fa-arrow-up-right-from-square text-[10px] ml-1 opacity-0 group-hover:opacity-100"></i></h4>
                                    <div class="text-[10px] text-slate-500 font-mono">${item.serial}</div>
                                </div>
                                <span class="${urgencyBg} ${urgencyText} text-[10px] font-bold px-2 py-1 rounded-full border border-slate-100 whitespace-nowrap">${diffDays} Hari Lagi</span>
                             </div>
                             
                             <div class="mt-3 pt-3 border-t border-slate-50 space-y-1">
                                <div class="flex items-center gap-2">
                                     <div class="w-5 flex justify-center"><i class="fa-regular fa-user text-slate-400 text-xs"></i></div>
                                     <span class="text-xs font-semibold text-slate-700 truncate">${empName}</span>
                                </div>
                                <div class="flex items-center gap-2">
                                     <div class="w-5 flex justify-center"><i class="fa-solid fa-coins text-slate-400 text-xs"></i></div>
                                     <span class="text-xs text-slate-600">Budget: <span class="font-mono font-medium text-slate-700">${budgetFormatted}</span></span>
                                </div>
                             </div>
                        </div>`;
            });

            // Update the main header text if possible
            const warningTitle = document.getElementById('dashboard-warning-title');
            if (warningTitle) warningTitle.innerHTML = `<i class="fa-regular fa-bell text-white"></i> Notifikasi Sewa <span class="bg-white text-orange-600 text-[10px] px-2 py-0.5 rounded-full ml-2">${warningCount}</span>`;

        } else {
            warningContainer.classList.add('hidden');
        }

        renderCombinedChart(inv);

        const actList = document.getElementById('dash-activities');
        actList.innerHTML = '';
        inv.slice(-3).reverse().forEach(item => {
            actList.innerHTML += `<div class="flex gap-4 items-start pb-4 border-b border-slate-50 last:border-0 last:pb-0"><div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0 text-xs font-bold">NEW</div><div><h4 class="text-sm font-bold text-slate-800">Aset Baru</h4><p class="text-xs text-slate-500 mt-0.5">Menambahkan ${item.brand} ${item.model} (${item.serial}).</p></div></div>`;
        });

        const costList = document.getElementById('dash-cost-list');
        costList.innerHTML = '';
        const companyCosts = {};
        const companyUnits = {}; // Track unit counts
        let maxCost = 0;

        Object.keys(costAnalysisData).forEach(comp => {
            if (activeCompany !== 'Global' && comp !== activeCompany) return;
            const total = costAnalysisData[comp].reduce((a, b) => a + b, 0);

    // --- RENTAL REPORT LOGIC ---
    function renderRentalReport() {
        const month = parseInt(document.getElementById('rental-month').value);
        const year = parseInt(document.getElementById('rental-year').value);
        const tbody = document.getElementById('rental-report-body');

        if (!tbody) return; // Guard clause if element doesn't exist yet

        tbody.innerHTML = '';

        let totalCost = 0;
        let totalUnit = 0;
        const reportData = [];

        // Filter valid rental assets for the selected period
        inventoryData.forEach(item => {
            // Must be 'Sewa'
            if (item.type !== 'Sewa') return;
            // Match Company Filter
            if (activeCompany !== 'Global' && item.company !== activeCompany) return;

            const cost = parseInt(item.rentalCost) || 0;
            if (cost <= 0) return;

            // Check if active in selected period
            // Active if:
            // 1. Rental Start <= Selected Period End
            // 2. Rental End >= Selected Period Start OR Rental End is null (ongoing)

            // Selected Period
            const periodStart = new Date(year, month, 1);
            const periodEnd = new Date(year, month + 1, 0); // Last day of month

            // Asset Period
            const assetStart = item.rentalStart ? new Date(item.rentalStart) : new Date(0); // Default to long ago if missing

            // Handle Rental End Logic
            // If rentalEnd is present, asset stops costing after that date.
            // If assetStart > periodEnd, it hasn't started yet -> Skip
            if (assetStart > periodEnd) return;

            // If rentalEnd exists and is before periodStart, it has ended -> Skip
            if (item.rentalEnd) {
                const assetEnd = new Date(item.rentalEnd);
                if (assetEnd < periodStart) return;
            }

            // If we are here, the asset was active during the month
            totalCost += cost;
            totalUnit++;

            const emp = employeeData.find(e => e.assignedAssetId == item.id);
            const userLoc = emp ? `${emp.name} (${emp.department})` : (item.assignedTo || item.company);

            reportData.push({
                ref: item.rentalRef || '-',
                device: `${item.brand} ${item.model}`,
                serial: item.serial,
                user: userLoc,
                vendor: item.vendor || '-',
                period: `${item.rentalStart ? formatDate(item.rentalStart) : '?'} s/d ${item.rentalEnd ? formatDate(item.rentalEnd) : 'Now'}`,
                cost: cost,
                rawBrand: item.brand || 'Other'
            });
        });

        if (reportData.length === 0) {
            document.getElementById('rental-empty-msg').classList.remove('hidden');
        } else {
            document.getElementById('rental-empty-msg').classList.add('hidden');
            reportData.forEach(d => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-50 last:border-0">
                        <td class="px-6 py-4 text-xs font-mono text-slate-600">${d.ref}</td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800 text-sm">${d.device}</div>
                            <div class="text-[11px] text-slate-500 font-mono">${d.serial}</div>
                        </td>
                        <td class="px-6 py-4 text-xs text-slate-600">${d.user}</td>
                        <td class="px-6 py-4 text-xs text-slate-600">${d.vendor}</td>
                         <td class="px-6 py-4 text-[11px] text-slate-500">${d.period}</td>
                        <td class="px-6 py-4 text-right font-mono text-sm font-bold text-slate-700">Rp ${d.cost.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            });
        }

        document.getElementById('rental-total-cost').innerText = 'Rp ' + totalCost.toLocaleString('id-ID');
        document.getElementById('rental-total-unit').innerText = totalUnit;

        // Aggregate Brand Data for Chart
        const brandCounts = {};
        reportData.forEach(d => {
            const brand = d.rawBrand || 'Other';
            brandCounts[brand] = (brandCounts[brand] || 0) + 1;
        });

        renderRentalBrandChart(brandCounts);
    }

        if (rentalChartInstance) {
            rentalChartInstance.destroy();
        }

        ];

        // Custom Plugin for Data Labels
        const dataLabelPlugin = {
            id: 'dataLabels',
            afterDatasetsDraw(chart, args, options) {
                const { ctx } = chart;
                chart.data.datasets.forEach((dataset, i) => {
                    const meta = chart.getDatasetMeta(i);
                    meta.data.forEach((bar, index) => {
                        const data = dataset.data[index];
                        if (data > 0) { // Only draw if value > 0
                            ctx.fillStyle = '#ffffff'; // White text
                            ctx.font = 'bold 10px "Plus Jakarta Sans", sans-serif';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';

                            // Calculate position: center of bar width, and just below the top of the bar
                            // Actually, let's put it INSIDE the bar if possible, or on top if bar is small?
                            // User example has it INSIDE the bar, white text.
                            const x = bar.x;
                            const y = bar.y + 15; // +15 to push it down into the bar

                            ctx.fillText(data, x, y);
                        }
                    });
                });
            }
        };

        rentalChartInstance = new Chart(ctx, {
            type: 'bar',

                labels: brands,

                        },

                            precision: 0,

                        }

                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            font: { size: 10, weight: 'bold' }
                        }
                    }
                },

                    legend: {
                        display: false
                    },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                return ` ${context.raw} Unit`;
                            }
                        }
                    }
                }
            },
            plugins: [dataLabelPlugin]
        });
    }

        return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: '2-digit' });
    }

    function exportRentalReport() {
        const month = document.getElementById('rental-month').options[document.getElementById('rental-month').selectedIndex].text;
        const year = document.getElementById('rental-year').value;

        const rows = [['No Ref', 'Device', 'Serial Number', 'User / Lokasi', 'Vendor', 'Periode Sewa', 'Biaya Sewa']];

        // ... (Logic Duplicate - better to separate data gathering if complex, but here is simple)

        const trs = document.querySelectorAll('#rental-report-body tr');

    function renderCostTable() {
        const data = costAnalysisData;
        const tbody = document.getElementById('cost-table-body');
        tbody.innerHTML = '';

        const vbody = document.getElementById('cost-validation-table-body');
        if(vbody) vbody.innerHTML = '';
        const budgetPerCompany = {};
        employeeData.forEach(emp => {
            if(!budgetPerCompany[emp.company]) budgetPerCompany[emp.company] = 0;
            budgetPerCompany[emp.company] += (parseInt(emp.budget) || 0) * 12; // Annualize Employee Budget
        });

        const activeDevicesCount = {};
        const yearStart = new Date(selectedGlobalYear, 0, 1);
        const yearEnd = new Date(selectedGlobalYear, 11, 31);
        
        inventoryData.forEach(item => {
            if (item.type !== 'Sewa') return;
            // Only count laptop/PC devices
            const cat = (item.deviceCategory || '').trim();
            if (['Mobile Device', 'Tablet', 'Smartphone'].includes(cat)) return;
            const company = item.company || 'Unassigned';
            
            const cost = parseInt(item.rentalCost) || 0;
            if (cost <= 0) return;
            
            const assetStart = item.rentalStart ? new Date(item.rentalStart) : new Date(0);
            if (assetStart > yearEnd) return;
            
            if (item.rentalEnd) {
                const assetEnd = new Date(item.rentalEnd);
                if (assetEnd < yearStart) return;
            }
            if(!activeDevicesCount[company]) activeDevicesCount[company] = 0;
            activeDevicesCount[company]++;
        });

        const monthlyTotals = new Array(12).fill(0);
        let grandTotalAll = 0;
        let totalValBudget = 0;
        let totalValCost = 0;

        Object.keys(data).forEach(comp => {
            if (activeCompany !== 'Global' && comp !== activeCompany) return;
            const vals = data[comp];

            // Add to monthly totals
            vals.forEach((v, i) => monthlyTotals[i] += v);

            const total = vals.reduce((a, b) => a + b, 0);
            grandTotalAll += total;

            const cells = vals.map(v => `<td class="p-2 border border-slate-100 text-xs text-right text-slate-600">${v > 0 ? v.toLocaleString('id-ID') : '-'}</td>`).join('');
            tbody.innerHTML += `<tr><td class="p-2 border border-slate-100 text-xs font-bold text-brand-700">${comp}</td>${cells}<td class="p-2 border border-slate-100 text-xs font-bold text-right bg-slate-50">${total.toLocaleString('id-ID')}</td></tr>`;

            if(vbody) {
                const budgetStr = budgetPerCompany[comp] || 0;
                const cost = total;
                const remaining = budgetStr - cost;

                totalValBudget += budgetStr;
                totalValCost += cost;
                
                let statusBadge = '<span class="text-xs text-slate-400 font-bold">Unset</span>';
                let barColor = 'bg-slate-200';
                let percent = 0;

                if (budgetStr > 0) {
                    percent = Math.min((cost / budgetStr) * 100, 100);
                    if (cost > budgetStr) {
                        statusBadge = '<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-[10px] font-bold border border-red-200">Over Budget</span>';
                        barColor = 'bg-red-500';
                    } else {
                        statusBadge = '<span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-[10px] font-bold border border-emerald-200">Aman</span>';
                        barColor = 'bg-emerald-500';
                    }
                } else if (cost > 0) {
                    statusBadge = '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold border border-yellow-200">No Budget</span>';
                    barColor = 'bg-yellow-500';
                    percent = 100;
                }
                
                let remainingClass = remaining < 0 ? 'text-red-500 font-bold text-xs' : 'text-emerald-500 font-bold text-xs';
                if (budgetStr === 0) remainingClass = 'text-slate-400 text-xs';

                const deviceCount = activeDevicesCount[comp] || 0;
                vbody.innerHTML += `
                    <tr onclick="openCostBreakdownModal('${comp}')" class="hover:bg-indigo-50 border-b border-slate-50 transition-colors cursor-pointer group">
                        <td class="p-3 text-xs font-bold text-brand-600 group-hover:text-brand-800 transition-colors"><i class="fa-solid fa-magnifying-glass-chart mr-1 opacity-0 group-hover:opacity-100 transition-opacity"></i> ${comp}</td>
                        <td class="p-3 text-xs font-mono text-slate-600 text-center">${deviceCount} Unit</td>
                        <td class="p-3 text-xs font-mono text-slate-600 text-right">${budgetStr > 0 ? 'Rp ' + budgetStr.toLocaleString('id-ID') : '-'}</td>
                        <td class="p-3 text-xs font-mono text-slate-800 font-bold text-right">${cost > 0 ? 'Rp ' + cost.toLocaleString('id-ID') : '-'}</td>
                        <td class="p-3 font-mono text-right ${remainingClass}">${budgetStr > 0 ? (remaining < 0 ? '- Rp ' + Math.abs(remaining).toLocaleString('id-ID') : '+ Rp ' + remaining.toLocaleString('id-ID')) : '-'}</td>
                        <td class="p-3 text-center">${statusBadge}</td>
                        <td class="p-3 pl-6 pr-4">
                            <div class="flex items-center gap-2">
                                <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                    <div class="${barColor} h-full" style="width: ${percent}%"></div>
                                </div>
                                <span class="text-[10px] text-slate-500 font-bold w-8 text-right">${Math.round(percent)}%</span>
                            </div>
                        </td>
                    </tr>
                `;
            }
        });

        if(vbody && activeCompany === 'Global') {
            const totRemaining = totalValBudget - totalValCost;
            const totalAllDevices = Object.values(activeDevicesCount).reduce((a, b) => a + b, 0);
            let percentT = 0; if (totalValBudget > 0) percentT = Math.min((totalValCost / totalValBudget) * 100, 100);
            vbody.innerHTML += `
                <tr class="bg-slate-50 border-t-2 border-slate-200">
                    <td class="p-3 text-xs font-extrabold text-slate-900">GRAND TOTAL</td>
                    <td class="p-3 text-xs font-mono font-bold text-slate-900 text-center">${totalAllDevices} Unit</td>
                    <td class="p-3 text-xs font-mono font-bold text-slate-900 text-right">${totalValBudget > 0 ? 'Rp ' + totalValBudget.toLocaleString('id-ID') : '-'}</td>
                    <td class="p-3 text-xs font-mono font-bold text-slate-900 text-right">${totalValCost > 0 ? 'Rp ' + totalValCost.toLocaleString('id-ID') : '-'}</td>
                    <td class="p-3 text-xs font-mono font-bold text-right ${totRemaining < 0 ? 'text-red-600' : 'text-emerald-600'}">${totalValBudget > 0 ? (totRemaining < 0 ? '- Rp ' + Math.abs(totRemaining).toLocaleString('id-ID') : '+ Rp ' + totRemaining.toLocaleString('id-ID')) : '-'}</td>
                    <td class="p-3 text-center"></td>
                    <td class="p-3 pl-6 pr-4 text-right text-[11px] font-bold text-slate-600">${Math.round(percentT)}% Used</td>
                </tr>
            `;
        }

        // Render Total Row
        const totalCells = monthlyTotals.map(v => `<td class="p-2 border border-slate-200 text-xs text-right font-bold text-slate-900 bg-slate-100">${v > 0 ? v.toLocaleString('id-ID') : '-'}</td>`).join('');
        tbody.innerHTML += `<tr class="border-t-2 border-slate-300">
            <td class="p-2 border border-slate-200 text-xs font-extrabold text-slate-900 bg-slate-100">TOTAL BULANAN</td>
            ${totalCells}
            <td class="p-2 border border-slate-200 text-xs font-extrabold text-right text-white bg-slate-800">${grandTotalAll.toLocaleString('id-ID')}</td>
        </tr>`;
        
        if (typeof renderCostChart === 'function') renderCostChart(monthlyTotals);
    }

    function openCostBreakdownModal(company) {
        document.getElementById('cost-breakdown-title').innerText = `Breakdown Biaya Sewa: ${company}`;
        document.getElementById('cost-breakdown-year').innerText = `Tahun ${selectedGlobalYear}`;
        
        const tbody = document.getElementById('cost-breakdown-table-body');
        const emptyMsg = document.getElementById('cost-breakdown-empty');
        tbody.innerHTML = '';
        
        const yearStart = new Date(selectedGlobalYear, 0, 1);
        const yearEnd = new Date(selectedGlobalYear, 11, 31);
        
        // Use costAnalysisData[company] total for the exact project total (calculated by backend)
        const vals = costAnalysisData[company] || [];
        const totalYearlyCost = vals.reduce((a, b) => a + b, 0);

        const filtered = inventoryData.filter(item => {
            if (item.type !== 'Sewa') return false;
            if (item.company !== company) return false;
            // Only laptop/PC devices
            const cat = (item.deviceCategory || '').trim();
            if (['Mobile Device', 'Tablet', 'Smartphone'].includes(cat)) return false;
            
            const cost = parseInt(item.rentalCost) || 0;
            if (cost <= 0) return false;
            
            const assetStart = item.rentalStart ? new Date(item.rentalStart) : new Date(0);
            if (assetStart > yearEnd) return false;
            
            if (item.rentalEnd) {
                const assetEnd = new Date(item.rentalEnd);
                if (assetEnd < yearStart) return false;
            }
            return true;
        });
        
        if (filtered.length === 0) {
            emptyMsg.classList.remove('hidden');
        } else {
            emptyMsg.classList.add('hidden');
            
            filtered.forEach(item => {
                const emp = employeeData.find(e => String(e.assignedAssetId) === String(item.id));
                const userName = emp ? `${emp.name} (${emp.department})` : (item.assignedTo || 'Unassigned / Spare');
                const period = `${item.rentalStart ? formatDate(item.rentalStart) : '?'} s/d ${item.rentalEnd ? formatDate(item.rentalEnd) : 'Ongoing'}`;
                const cost = parseInt(item.rentalCost) || 0;
                
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 border-b border-slate-50 transition-colors">
                        <td class="p-3 align-top">
                            <div class="font-bold text-xs text-slate-800">${item.brand} ${item.model}</div>
                            <div class="text-[10px] text-slate-500 font-mono">SN: ${item.serial}</div>
                        </td>
                        <td class="p-3 align-top text-xs font-semibold text-slate-700">${userName}</td>
                        <td class="p-3 align-top text-xs text-slate-700">${item.vendor || '-'}</td>
                        <td class="p-3 align-top text-[11px] text-slate-500">${period}</td>
                        <td class="p-3 align-top text-xs font-mono font-bold text-slate-800 text-right whitespace-nowrap">Rp ${cost.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            });
        }
        
        document.getElementById('cost-breakdown-total').innerText = 'Rp ' + totalYearlyCost.toLocaleString('id-ID');
        document.getElementById('cost-breakdown-modal').classList.remove('hidden');
    }

            let tenantInfo = '';
            if (item.type === 'Sewa') {
                const endDate = item.rentalEnd ? new Date(item.rentalEnd).toLocaleDateString('id-ID') : '-';
                tenantInfo = `<div class="flex flex-col"><span class="text-[11px] font-bold text-orange-500"><i class="fa-regular fa-clock"></i> Sewa</span><span class="text-[10px] text-slate-400">End: ${endDate}</span></div>`;
            } else {
                tenantInfo = `<span class="text-[11px] font-bold text-slate-400"><i class="fa-solid fa-building"></i> Kantor</span>`;
            }
            if (item.assignedTo) tenantInfo += `<div class="mt-1 text-[11px] text-slate-700 font-medium border-t border-slate-100 pt-1">${item.assignedTo}</div>`;

            const actions = `<div class="flex items-center justify-end gap-2"><button onclick="editMobileDevice('${item.id}')" class="w-7 h-7 rounded flex items-center justify-center bg-blue-50 text-blue-600 hover:bg-blue-100 transition-colors border border-blue-100" title="Edit"><i class="fa-regular fa-pen-to-square text-xs"></i></button><button onclick="deleteInventoryItem('${item.id}')" class="w-7 h-7 rounded flex items-center justify-center bg-red-50 text-red-600 hover:bg-red-100 transition-colors border border-red-100" title="Delete"><i class="fa-regular fa-trash-can text-xs"></i></button><button class="w-7 h-7 rounded flex items-center justify-center bg-orange-50 text-orange-600 hover:bg-orange-100 transition-colors border border-orange-100" title="Email/BAST"><i class="fa-regular fa-envelope text-xs"></i></button></div>`;
            const categoryLabel = item.deviceCategory === 'Tablet' ? 
                `<span class="text-[9px] px-1.5 py-0.5 rounded bg-purple-50 text-purple-600 border border-purple-100 font-bold ml-2">TABLET</span>` : 
                (item.deviceCategory === 'Smartphone' ? `<span class="text-[9px] px-1.5 py-0.5 rounded bg-blue-50 text-blue-600 border border-blue-100 font-bold ml-2">HP</span>` : '');

            tbody.innerHTML += `<tr class="hover:bg-slate-50 border-b border-slate-50 last:border-0 group transition-colors"><td class="px-6 py-4 align-top"><div class="flex items-center"><div class="font-bold text-slate-800 text-sm mb-0.5">${item.brand} ${item.model}</div>${categoryLabel}</div><div class="text-[11px] text-slate-500 font-mono">${item.serial}</div>${colorInfo}</td><td class="px-6 py-4 align-top"><div class="text-[11px] text-slate-700 font-semibold mb-0.5">${specsLine1}</div><div class="text-[10px] text-slate-500">${specsLine2}</div></td><td class="px-6 py-4 align-top">${statusBadge}</td><td class="px-6 py-4 align-top">${tenantInfo}</td><td class="px-6 py-4 align-top text-right">${actions}</td></tr>`;
        });
    }

    function switchMobileTab(tab) {
        const details = document.getElementById('mob-asset-tab-details');
        const history = document.getElementById('mob-asset-tab-history');
        const btnDetails = document.getElementById('mob-tab-btn-details');
        const btnHistory = document.getElementById('mob-tab-btn-history');

        const activeClass = 'text-brand-600 border-b-2 border-brand-600 bg-brand-50/50';
        const inactiveClass = 'text-slate-400 hover:text-slate-600';

        if (tab === 'details') {
            details.classList.remove('hidden');
            history.classList.add('hidden');
            btnDetails.className = 'flex-1 py-3 text-sm font-bold ' + activeClass;
            btnHistory.className = 'flex-1 py-3 text-sm font-bold ' + inactiveClass;
        } else {
            details.classList.add('hidden');
            history.classList.remove('hidden');
            btnDetails.className = 'flex-1 py-3 text-sm font-bold ' + inactiveClass;
            btnHistory.className = 'flex-1 py-3 text-sm font-bold ' + activeClass;

            const assetId = document.getElementById('mob-asset-id').value;
            if (assetId) renderAssetHistory(assetId, 'mob-asset-history-list');
        }
    }

    function setMobileAssetType(type) {
        document.getElementById('mob-form-type-input').value = type;
        const btnBeli = document.getElementById('mob-btn-type-beli');
        const btnSewa = document.getElementById('mob-btn-type-sewa');
        const rentalSpecifics = document.getElementById('mob-rental-specifics');
        const officeSpecifics = document.getElementById('mob-office-specifics');

        const activeBeli = "w-full py-2 rounded-lg text-sm font-bold border bg-indigo-50 text-indigo-600 border-indigo-200 transition-all";
        const activeSewa = "w-full py-2 rounded-lg text-sm font-bold border bg-orange-50 text-orange-600 border-orange-200 transition-all";
        const inactive = "w-full py-2 rounded-lg text-sm font-medium border border-slate-200 text-slate-400 hover:text-slate-600 hover:bg-slate-50 transition-all";

        if (type === 'Beli') {
            btnBeli.className = activeBeli;
            btnSewa.className = inactive;
            if (rentalSpecifics) rentalSpecifics.classList.add('hidden');
            if (officeSpecifics) officeSpecifics.classList.remove('hidden');
        } else {
            btnSewa.className = activeSewa;
            btnBeli.className = inactive;
            if (rentalSpecifics) rentalSpecifics.classList.remove('hidden');
            if (officeSpecifics) officeSpecifics.classList.add('hidden');
        }
    }

    function resetMobileForm() {
        document.getElementById('mob-asset-form').reset();
        document.getElementById('mob-asset-id').value = "";
        setMobileAssetType('Beli');
        const statusEl = document.getElementById('mob-form-status');
        if (statusEl) statusEl.value = 'Available';
        document.getElementById('mob-form-title').innerText = "Tambah Aset Mobile";
        document.getElementById('mob-btn-submit-asset').innerText = "Simpan";
        document.getElementById('mob-btn-cancel-edit').classList.add('hidden');
        document.getElementById('mob-btn-offboard').classList.add('hidden');
        switchMobileTab('details');
    }

    function editMobileDevice(id) {
        const item = inventoryData.find(i => i.id == id);
        if (!item) return;

        switchMobileTab('details');
        document.getElementById('mob-asset-id').value = item.id;
        document.getElementById('mob-form-company').value = item.company;
        document.getElementById('mob-form-category').value = item.deviceCategory || 'Mobile Device';
        setMobileAssetType(item.type);
        document.getElementById('mob-form-serial').value = item.serial;
        document.getElementById('mob-form-brand').value = item.brand;
        document.getElementById('mob-form-processor').value = item.processor || '';
        document.getElementById('mob-form-model').value = item.model;
        document.getElementById('mob-form-ram').value = item.ram || '';
        document.getElementById('mob-form-storage').value = item.storage || '';
        document.getElementById('mob-form-os').value = item.os || '';
        document.getElementById('mob-form-purchase-date').value = item.purchaseDate || '';
        document.getElementById('mob-form-location').value = item.location || item.gisLocation || '';
        
        if (item.type === 'Sewa') {
            document.getElementById('mob-form-rental-ref').value = item.rentalRef || '';
            document.getElementById('mob-form-vendor').value = item.vendor || '';
            document.getElementById('mob-form-rental-cost').value = item.rentalCost ? parseInt(item.rentalCost).toLocaleString('id-ID') : '';
            if (item.rentalStart) document.getElementById('mob-form-rental-start').value = item.rentalStart.split('T')[0];
            if (item.rentalEnd) document.getElementById('mob-form-rental-end').value = item.rentalEnd.split('T')[0];
        }
        
        document.getElementById('mob-form-title').innerText = "Edit Aset Mobile";
        document.getElementById('mob-btn-submit-asset').innerText = "Update Aset";
        document.getElementById('mob-btn-cancel-edit').classList.remove('hidden');
        
        const statusInput = document.getElementById('mob-form-status');
        if (statusInput) statusInput.value = item.status || 'Available';

        const btnOffboard = document.getElementById('mob-btn-offboard');
        if (item.status === 'Assigned' || item.type === 'Sewa') {
            btnOffboard.classList.remove('hidden');
        } else {
            btnOffboard.classList.add('hidden');
        }

        document.querySelector('#mobiledevice').scrollIntoView({ behavior: 'smooth' });
    }

    function handleMobileSubmit(e) {
        e.preventDefault();
        showLoading(true);
        const formData = new FormData(document.getElementById('mob-asset-form'));
        const data = Object.fromEntries(formData.entries());

        if (data.rentalCost) data.rentalCost = data.rentalCost.replace(/\./g, '');

        const successHandler = (res) => {
            if (res.success) {
                resetMobileForm();
                refreshData(); // this also redraws the table
            } else {
                alert("Error: " + res.message);
                showLoading(false);
            }
        };

        if (data.id) google.script.run.withSuccessHandler(successHandler).apiUpdateInventory(data);
        else {
            if (!data.id) delete data.id;
            google.script.run.withSuccessHandler(successHandler).apiAddInventory(data);
        }
    }

    // --- MOBILE DEVICE COST ANALYSIS ---

    function renderMobileKPI() {
        const mobileItems = inventoryData.filter(i => ['Mobile Device', 'Tablet', 'Smartphone'].includes(i.deviceCategory));
        const filtered = activeCompany === 'Global' ? mobileItems : mobileItems.filter(i => i.company === activeCompany);

        let totalSmartphone = 0, totalTablet = 0, totalSewaBulanan = 0, sewaSmartphone = 0, sewaTablet = 0;
        filtered.forEach(item => {
            if (item.deviceCategory === 'Smartphone') { totalSmartphone++; if(item.type === 'Sewa') sewaSmartphone++; }
            else { totalTablet++; if(item.type === 'Sewa') sewaTablet++; }
            if (item.type === 'Sewa') totalSewaBulanan += (parseInt(item.rentalCost) || 0);
        });

        let totalYTD = 0;
        Object.keys(mobileCostAnalysisData).forEach(comp => {
            if (activeCompany !== 'Global' && comp !== activeCompany) return;
            totalYTD += (mobileCostAnalysisData[comp] || []).reduce((a, b) => a + b, 0);
        });

        const fmtCurrency = (v) => 'Rp ' + v.toLocaleString('id-ID');
        const el = document.getElementById('mob-kpi-container');
        if (!el) return;
        el.innerHTML = `
            <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-wider mb-1">Total Smartphone</p>
                    <h3 class="text-xl font-bold text-blue-700">${totalSmartphone}</h3>
                    <p class="text-[10px] text-blue-400 mt-0.5">${sewaSmartphone} sewa · ${totalSmartphone - sewaSmartphone} kantor</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                </div>
            </div>
            <div class="bg-purple-50 rounded-xl p-4 border border-purple-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-purple-500 uppercase tracking-wider mb-1">Total Tablet</p>
                    <h3 class="text-xl font-bold text-purple-700">${totalTablet}</h3>
                    <p class="text-[10px] text-purple-400 mt-0.5">${sewaTablet} sewa · ${totalTablet - sewaTablet} kantor</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center">
                    <i class="fa-solid fa-tablet-screen-button"></i>
                </div>
            </div>
            <div class="bg-orange-50 rounded-xl p-4 border border-orange-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-orange-500 uppercase tracking-wider mb-1">Biaya Sewa / Bulan</p>
                    <h3 class="text-lg font-bold text-orange-700">${fmtCurrency(totalSewaBulanan)}</h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center">
                    <i class="fa-solid fa-money-bill-wave"></i>
                </div>
            </div>
            <div class="bg-emerald-50 rounded-xl p-4 border border-emerald-100 flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider mb-1">Cost YTD (${selectedGlobalYear})</p>
                    <h3 class="text-lg font-bold text-emerald-700">${fmtCurrency(totalYTD)}</h3>
                </div>
                <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
            </div>
        `;
    }

    function renderMobileCostTable() {
        const data = mobileCostAnalysisData;
        const tbody = document.getElementById('mob-cost-table-body');
        if (!tbody) return;
        tbody.innerHTML = '';

        const budgetMobilePerCompany = {};
        employeeData.forEach(emp => {
            if(!budgetMobilePerCompany[emp.company]) budgetMobilePerCompany[emp.company] = 0;
            budgetMobilePerCompany[emp.company] += (parseInt(emp.budgetMobile) || 0) * 12;
        });

        const mobileDevicesCount = {};
        const yearStart = new Date(selectedGlobalYear, 0, 1);
        const yearEnd = new Date(selectedGlobalYear, 11, 31);
        
        inventoryData.forEach(item => {
            if (item.type !== 'Sewa') return;
            const cat = (item.deviceCategory || '').trim();
            if (!['Mobile Device', 'Tablet', 'Smartphone'].includes(cat)) return;
            const company = item.company || 'Unassigned';
            const cost = parseInt(item.rentalCost) || 0;
            if (cost <= 0) return;
            const assetStart = item.rentalStart ? new Date(item.rentalStart) : new Date(0);
            if (assetStart > yearEnd) return;
            if (item.rentalEnd) { if (new Date(item.rentalEnd) < yearStart) return; }
            if(!mobileDevicesCount[company]) mobileDevicesCount[company] = 0;
            mobileDevicesCount[company]++;
        });

        const monthlyTotals = new Array(12).fill(0);
        let grandTotalAll = 0;
        let totalValBudget = 0, totalValCost = 0;

        const vbody = document.getElementById('mob-cost-validation-body');
        if(vbody) vbody.innerHTML = '';

        Object.keys(data).forEach(comp => {
            if (activeCompany !== 'Global' && comp !== activeCompany) return;
            const vals = data[comp];
            vals.forEach((v, i) => monthlyTotals[i] += v);
            const total = vals.reduce((a, b) => a + b, 0);
            grandTotalAll += total;

            const cells = vals.map(v => `<td class="p-2 border border-slate-100 text-xs text-right text-slate-600">${v > 0 ? v.toLocaleString('id-ID') : '-'}</td>`).join('');
            tbody.innerHTML += `<tr><td class="p-2 border border-slate-100 text-xs font-bold text-purple-700">${comp}</td>${cells}<td class="p-2 border border-slate-100 text-xs font-bold text-right bg-slate-50">${total.toLocaleString('id-ID')}</td></tr>`;

            if(vbody) {
                const budgetStr = budgetMobilePerCompany[comp] || 0;
                const remaining = budgetStr - total;
                totalValBudget += budgetStr;
                totalValCost += total;
                let statusBadge = '<span class="text-xs text-slate-400 font-bold">Unset</span>';
                let barColor = 'bg-slate-200'; let percent = 0;
                if (budgetStr > 0) {
                    percent = Math.min((total / budgetStr) * 100, 100);
                    statusBadge = total > budgetStr ? '<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-[10px] font-bold border border-red-200">Over Budget</span>' : '<span class="bg-emerald-100 text-emerald-600 px-2 py-1 rounded text-[10px] font-bold border border-emerald-200">Aman</span>';
                    barColor = total > budgetStr ? 'bg-red-500' : 'bg-emerald-500';
                } else if (total > 0) { statusBadge = '<span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded text-[10px] font-bold border border-yellow-200">No Budget</span>'; barColor = 'bg-yellow-500'; percent = 100; }
                let remainingClass = remaining < 0 ? 'text-red-500 font-bold text-xs' : 'text-emerald-500 font-bold text-xs';
                if (budgetStr === 0) remainingClass = 'text-slate-400 text-xs';
                const deviceCount = mobileDevicesCount[comp] || 0;
                vbody.innerHTML += `<tr class="hover:bg-purple-50/50 border-b border-slate-50 transition-colors"><td class="p-3 text-xs font-bold text-purple-600">${comp}</td><td class="p-3 text-xs font-mono text-slate-600 text-center">${deviceCount} Unit</td><td class="p-3 text-xs font-mono text-slate-600 text-right">${budgetStr > 0 ? 'Rp ' + budgetStr.toLocaleString('id-ID') : '-'}</td><td class="p-3 text-xs font-mono text-slate-800 font-bold text-right">${total > 0 ? 'Rp ' + total.toLocaleString('id-ID') : '-'}</td><td class="p-3 font-mono text-right ${remainingClass}">${budgetStr > 0 ? (remaining < 0 ? '- Rp ' + Math.abs(remaining).toLocaleString('id-ID') : '+ Rp ' + remaining.toLocaleString('id-ID')) : '-'}</td><td class="p-3 text-center">${statusBadge}</td><td class="p-3 pl-6 pr-4"><div class="flex items-center gap-2"><div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden"><div class="${barColor} h-full" style="width: ${percent}%"></div></div><span class="text-[10px] text-slate-500 font-bold w-8 text-right">${Math.round(percent)}%</span></div></td></tr>`;
            }
        });

        const totalCells = monthlyTotals.map(v => `<td class="p-2 border border-slate-200 text-xs text-right font-bold text-slate-900 bg-slate-100">${v > 0 ? v.toLocaleString('id-ID') : '-'}</td>`).join('');
        tbody.innerHTML += `<tr class="border-t-2 border-slate-300"><td class="p-2 border border-slate-200 text-xs font-extrabold text-slate-900 bg-slate-100">TOTAL BULANAN</td>${totalCells}<td class="p-2 border border-slate-200 text-xs font-extrabold text-right text-white bg-purple-700">${grandTotalAll.toLocaleString('id-ID')}</td></tr>`;

        if(vbody && activeCompany === 'Global') {
            const totR = totalValBudget - totalValCost;
            const totalD = Object.values(mobileDevicesCount).reduce((a, b) => a + b, 0);
            let pT = 0; if (totalValBudget > 0) pT = Math.min((totalValCost / totalValBudget) * 100, 100);
            vbody.innerHTML += `<tr class="bg-slate-50 border-t-2 border-slate-200"><td class="p-3 text-xs font-extrabold text-slate-900">GRAND TOTAL</td><td class="p-3 text-xs font-mono font-bold text-slate-900 text-center">${totalD} Unit</td><td class="p-3 text-xs font-mono font-bold text-slate-900 text-right">${totalValBudget > 0 ? 'Rp ' + totalValBudget.toLocaleString('id-ID') : '-'}</td><td class="p-3 text-xs font-mono font-bold text-slate-900 text-right">${totalValCost > 0 ? 'Rp ' + totalValCost.toLocaleString('id-ID') : '-'}</td><td class="p-3 text-xs font-mono font-bold text-right ${totR < 0 ? 'text-red-600' : 'text-emerald-600'}">${totalValBudget > 0 ? (totR < 0 ? '- Rp ' + Math.abs(totR).toLocaleString('id-ID') : '+ Rp ' + totR.toLocaleString('id-ID')) : '-'}</td><td class="p-3 text-center"></td><td class="p-3 pl-6 pr-4 text-right text-[11px] font-bold text-slate-600">${Math.round(pT)}% Used</td></tr>`;
        }

        if (typeof renderMobileCostChart === 'function') renderMobileCostChart(monthlyTotals);
        if (typeof renderMobileKPI === 'function') renderMobileKPI();
    }

    function renderMobileCostChart(monthlyTotals) {
        const ctx = document.getElementById('mob-cost-chart');
        if (!ctx) return;
        if (chartInstanceMobileCost) chartInstanceMobileCost.destroy();
        chartInstanceMobileCost = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'],
                datasets: [{
                    label: 'Biaya Sewa Mobile (Rp)',
                    data: monthlyTotals,
                    borderColor: '#7c3aed',
                    backgroundColor: 'rgba(124, 58, 237, 0.1)',
                    borderWidth: 2, pointBackgroundColor: '#fff', pointBorderColor: '#7c3aed',
                    pointBorderWidth: 2, pointRadius: 4, pointHoverRadius: 6, fill: true, tension: 0.4
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { borderDash: [2, 4], color: '#e2e8f0' },
                        ticks: { callback: function(v) { if (v >= 1000000) return (v/1000000)+' Jt'; if (v >= 1000) return (v/1000)+'k'; return v; }, font: { size: 10 }, color: '#64748b' }, border: { display: false } },
                    x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#64748b' }, border: { display: false } }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: '#1e293b', callbacks: { label: function(c) { return 'Rp ' + c.raw.toLocaleString('id-ID'); } } }
                }
            }
        });
    }

    function updateEmployeeBudgetMobile(empId, value) {
        const cleanValue = parseInt(value.replace(/\D/g, '')) || 0;
        const emp = employeeData.find(e => e.id === empId);
        if (!emp) return;
        emp.budgetMobile = cleanValue;
        google.script.run.withSuccessHandler(() => {
            if (typeof renderMobileCostTable === 'function') renderMobileCostTable();
        }).withFailureHandler(() => { alert("Gagal menyimpan budget mobile."); }).apiUpdateEmployee({ id: empId, budgetMobile: cleanValue });
    }

</script>
