<!-- ASSET HISTORY & OFFBOARDING COMPONENT -->
<div id="offboard-modal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 hidden">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 transform transition-all scale-100">
        <h3 class="text-lg font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">Proses Pengembalian Aset
            (Offboarding)</h3>

        <div class="mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
            <div class="text-xs text-slate-500">Aset</div>
            <div id="offboard-asset-name" class="font-bold text-slate-800 text-sm"></div>
            <div id="offboard-asset-serial" class="text-xs font-mono text-slate-500"></div>
        </div>

        <form onsubmit="handleOffboardSubmit(event)" class="space-y-4">
            <input type="hidden" id="offboard-asset-id">

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Status Akhir Aset</label>
                <select name="status" id="offboard-status" title="Status Akhir Aset"
                    class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:border-brand-500"
                    required>
                    <option value="" disabled selected>-- Pilih Status --</option>
                    <option value="Available">Available (Kembali ke Pool)</option>
                    <option value="Returned">Returned (Kembali ke Vendor/Habis Sewa)</option>
                    <option value="Broken">Broken (Rusak/Maintenance)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">Catatan</label>
                <textarea name="notes" id="offboard-notes" rows="3"
                    class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none focus:border-brand-500"
                    placeholder="Contoh: Masa sewa habis, Kondisi baik..."></textarea>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="document.getElementById('offboard-modal').classList.add('hidden')"
                    class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg">Batal</button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-bold text-white bg-red-600 hover:bg-red-700 rounded-lg shadow-md shadow-red-600/20">Proses
                    Offboard</button>
            </div>
        </form>
    </div>
</div>

<script>
    // --- HISTORY LOGIC ---

    function openOffboardModal(assetId) {
        const item = inventoryData.find(i => i.id == assetId);
        if (!item) return;

        document.getElementById('offboard-asset-id').value = assetId;
        document.getElementById('offboard-asset-name').innerText = item.brand + ' ' + item.model;
        document.getElementById('offboard-asset-serial').innerText = item.serial || '-';
        document.getElementById('offboard-status').value = '';
        document.getElementById('offboard-notes').value = '';

        document.getElementById('offboard-modal').classList.remove('hidden');
    }

    function handleOffboardSubmit(e) {
        e.preventDefault();

        if (!confirm("Yakin ingin memproses offboarding aset ini? Aset akan dilepas dari karyawan saat ini.")) return;

        const assetId = document.getElementById('offboard-asset-id').value;
        const status = document.getElementById('offboard-status').value;
        const notes = document.getElementById('offboard-notes').value;

        showLoading(true);

        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                document.getElementById('offboard-modal').classList.add('hidden');
                // If we are in the edit modal, close it too or refresh it? 
                // Better close edit modal to update state cleanly.
                document.getElementById('inventory').scrollIntoView();
                // Reset form in Inventory
                resetAssetForm();
                refreshData();
            } else {
                alert(res.message);
                showLoading(false);
            }
        }).apiOffboardAsset({ assetId, status, notes });
    }

    function renderAssetHistory(assetId, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        container.innerHTML = '<div class="text-center py-4 text-xs text-slate-500"><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat histori...</div>';

        google.script.run.withSuccessHandler(history => {
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="text-center py-4 text-xs text-slate-400">Belum ada histori aset.</div>';
                return;
            }

            let html = '<div class="relative border-l border-slate-200 ml-3 space-y-4">';
            history.forEach(log => {
                const date = new Date(log.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                let icon = 'fa-circle-info';
                let color = 'bg-slate-100 text-slate-500';

                if (log.action === 'Assign') { icon = 'fa-user-check'; color = 'bg-blue-100 text-blue-600'; }
                else if (log.action === 'Return') { icon = 'fa-box-archive'; color = 'bg-orange-100 text-orange-600'; }

                html += `
                    <div class="ml-6 relative">
                        <div class="absolute -left-9 mt-1 w-6 h-6 rounded-full ${color} flex items-center justify-center border border-white shadow-sm">
                            <i class="fa-solid ${icon} text-[10px]"></i>
                        </div>
                        <div class="bg-slate-50 rounded-lg p-3 border border-slate-100">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-xs font-bold text-slate-700">${log.action}</span>
                                <span class="text-[10px] text-slate-400">${date}</span>
                            </div>
                            <div class="text-xs text-slate-600 mb-1">
                                ${log.empName ? `<span class="font-semibold">${log.empName}</span>` : 'System'}
                            </div>
                            ${log.notes ? `<div class="text-[11px] text-slate-500 italic">"${log.notes}"</div>` : ''}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }).apiGetAssetHistory(assetId);
    }
</script>
