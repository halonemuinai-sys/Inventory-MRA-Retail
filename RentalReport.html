<!-- RENTAL REPORT VIEW -->
<section id="rental-report" class="page-section hidden">
    <div
        class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm mb-6 flex flex-col md:flex-row gap-4 justify-between items-center">
        <div class="flex items-center gap-2">
            <h3 class="font-bold text-slate-700">Laporan Sewa Bulanan</h3>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <select id="rental-month" title="Bulan"
                class="bg-white border border-slate-200 rounded-lg text-sm px-4 py-2.5 outline-none"
                onchange="renderRentalReport()">
                <option value="0">Januari</option>
                <option value="1">Februari</option>
                <option value="2">Maret</option>
                <option value="3">April</option>
                <option value="4">Mei</option>
                <option value="5">Juni</option>
                <option value="6">Juli</option>
                <option value="7">Agustus</option>
                <option value="8">September</option>
                <option value="9">Oktober</option>
                <option value="10">November</option>
                <option value="11">Desember</option>
            </select>
            <select id="rental-year" title="Tahun"
                class="bg-white border border-slate-200 rounded-lg text-sm px-4 py-2.5 outline-none"
                onchange="renderRentalReport()">
                <!-- Populated by JS -->
            </select>
            <button onclick="exportRentalReport()"
                class="bg-emerald-50 text-emerald-600 border border-emerald-100 px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-emerald-100 transition-colors">
                <i class="fa-solid fa-file-excel mr-2"></i> Export
            </button>
        </div>
    </div>

    <!-- Summary Card & Chart -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <!-- Summary Stats -->
        <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div
                class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between h-fit">
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Biaya Sewa</div>
                    <div class="text-2xl font-bold text-slate-800" id="rental-total-cost">Rp 0</div>
                </div>
                <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                    <i class="fa-solid fa-money-bill-wave text-xl"></i>
                </div>
            </div>
            <div
                class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center justify-between h-fit">
                <div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Total Unit Sewa</div>
                    <div class="text-2xl font-bold text-slate-800" id="rental-total-unit">0</div>
                </div>
                <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-600">
                    <i class="fa-solid fa-laptop text-xl"></i>
                </div>
            </div>
        </div>

        <!-- Brand Chart -->
        <div
            class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex flex-col justify-center items-center relative h-64">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider w-full mb-2">Komposisi Brand</h4>
            <div class="w-full h-full relative">
                <canvas id="rental-brand-chart"></canvas>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden min-h-[500px]">
        <div class="overflow-x-auto">
            <table class="min-w-full text-left">
                <thead class="bg-slate-50/50 border-b border-slate-100">
                    <tr>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">No Ref</th>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Device</th>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">User /
                            Lokasi</th>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Vendor</th>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Periode Sewa
                        </th>
                        <th class="py-4 px-6 text-[11px] font-bold text-slate-400 uppercase tracking-wider text-right">
                            Biaya Sewa</th>
                    </tr>
                </thead>
                <tbody id="rental-report-body" class="divide-y divide-slate-50"></tbody>
            </table>
            <div id="rental-empty-msg" class="hidden p-12 text-center text-slate-400">
                <i class="fa-solid fa-file-invoice text-3xl mb-3 opacity-30"></i>
                <p>Tidak ada data sewa pada periode ini.</p>
            </div>
        </div>
    </div>
</section>
