<script>
    function renderRentalSpecTable() {
        const tbody = document.getElementById('rental-spec-table-body');
        const emptyMsg = document.getElementById('rental-spec-empty');
        if (!tbody) return;

        tbody.innerHTML = '';
        const searchElement = document.getElementById('rental-spec-search');
        if (!searchElement) return;

        const search = searchElement.value.toLowerCase();

        // Gabungkan employeeData dengan inventoryData (Sewa)
        const rentalAssets = inventoryData.filter(i => i.type === 'Sewa');
        
        const filtered = rentalAssets.filter(item => {
            const matchCompany = activeCompany === 'Global' || item.company === activeCompany;
            
            // Cari data employee yang assign ke asset ini
            const emp = employeeData.find(e => e.assignedAssetId == item.id);
            const empName = emp ? emp.name.toLowerCase() : (item.assignedTo || '').toLowerCase();
            
            const matchSearch = empName.includes(search) || 
                               (item.brand || '').toLowerCase().includes(search) || 
                               (item.model || '').toLowerCase().includes(search) || 
                               (item.serial || '').toLowerCase().includes(search) ||
                               (item.company || '').toLowerCase().includes(search) ||
                               (item.vendor || '').toLowerCase().includes(search);
                               
            return matchCompany && matchSearch;
        });

        if(filtered.length === 0) {
            emptyMsg.classList.remove('hidden');
        } else {
            emptyMsg.classList.add('hidden');
            
            // Sort by company then user name
            filtered.sort((a, b) => {
                if(a.company === b.company) {
                    const empA = employeeData.find(e => e.assignedAssetId == a.id);
                    const empB = employeeData.find(e => e.assignedAssetId == b.id);
                    const nameA = empA ? empA.name : (a.assignedTo || '');
                    const nameB = empB ? empB.name : (b.assignedTo || '');
                    return nameA.localeCompare(nameB);
                }
                return a.company.localeCompare(b.company);
            }).forEach(item => {
                const emp = employeeData.find(e => e.assignedAssetId == item.id);
                
                const userName = emp ? emp.name : (item.assignedTo || 'Unassigned / Spare');
                const userRole = emp ? emp.role : '-';
                const userDept = emp ? emp.department : '-';
                
                const specs = [item.processor, item.ram, item.storage].filter(Boolean).join(' | ') || '-';
                const period = `${item.rentalStart ? formatDate(item.rentalStart) : '?'} s/d ${item.rentalEnd ? formatDate(item.rentalEnd) : 'Ongoing'}`;

                tbody.innerHTML += `
                    <tr onclick="openRentalSpecModal('${item.id}')" class="hover:bg-indigo-50 border-b border-slate-50 transition-colors cursor-pointer group">
                        <td class="p-3 align-top">
                            <div class="font-bold text-xs text-slate-800 mb-0.5">${userName}</div>
                            <div class="text-[10px] text-slate-500"><i class="fa-solid fa-map-pin"></i> ${item.location || '-'}</div>
                        </td>
                        <td class="p-3 align-top">
                            <div class="text-xs font-semibold text-slate-700 mb-0.5">${userRole}</div>
                            <div class="text-[10px] text-slate-500">${userDept}</div>
                        </td>
                        <td class="p-3 text-[11px] font-bold text-brand-600 align-top">${item.company}</td>
                        <td class="p-3 align-top">
                            <div class="font-bold text-xs text-slate-800 mb-0.5">${item.brand} ${item.model}</div>
                            <div class="text-[10px] text-slate-500 font-mono">SN: ${item.serial}</div>
                        </td>
                        <td class="p-3 align-top">
                            <div class="text-[11px] font-semibold text-slate-700 mb-0.5">${specs}</div>
                            <div class="text-[10px] text-slate-500">OS: ${item.os || '-'}</div>
                        </td>
                        <td class="p-3 align-top">
                            <div class="text-[11px] font-bold text-indigo-600 mb-0.5">${item.vendor || '-'}</div>
                            <div class="text-[10px] text-slate-500 whitespace-nowrap">${period}</div>
                        </td>
                    </tr>
                `;
            });
        }
    }

    function openRentalSpecModal(assetId) {
        const item = inventoryData.find(i => String(i.id) === String(assetId));
        if (!item) return;
        
        const emp = employeeData.find(e => String(e.assignedAssetId) === String(item.id));
        const userName = emp ? emp.name : (item.assignedTo || 'Unassigned / Spare');
        const userDept = emp ? emp.department : '-';
        const modalContent = document.getElementById('rental-spec-modal-content');
        
        const period = `${item.rentalStart ? formatDate(item.rentalStart) : '?'} s/d ${item.rentalEnd ? formatDate(item.rentalEnd) : 'Ongoing'}`;
        const costStr = item.rentalCost ? 'Rp ' + parseInt(item.rentalCost).toLocaleString('id-ID') : '-';
        
        modalContent.innerHTML = `
            <div class="flex items-center gap-3 mb-2">
                <div class="w-12 h-12 rounded-full bg-indigo-50 border border-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-lg shrink-0">
                    <i class="fa-solid fa-laptop-code"></i>
                </div>
                <div class="min-w-0 flex-1">
                    <div class="font-bold text-slate-800 text-base truncate" title="${item.brand} ${item.model}">${item.brand} ${item.model}</div>
                    <div class="text-xs font-mono text-slate-500 bg-slate-100 px-2 py-0.5 rounded inline-block mt-1">SN: ${item.serial || '-'}</div>
                </div>
            </div>
            
            <div class="bg-blue-50/50 rounded-lg p-3.5 border border-blue-100 mb-2">
                <div class="flex items-center gap-2 mb-1.5">
                    <i class="fa-solid fa-user-tie text-blue-500 text-xs"></i>
                    <div class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">Pengguna Saat Ini</div>
                </div>
                <div class="font-bold text-slate-800 text-sm mb-0.5">${userName}</div>
                <div class="text-xs text-slate-600">${userDept} &bull; ${item.company} &bull; ${item.location || '-'}</div>
            </div>
            
            <div class="space-y-1.5 pt-2">
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">Vendor Sewa</div>
                    <div class="font-bold text-slate-800 text-right">${item.vendor || '-'}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">Periode</div>
                    <div class="font-bold text-slate-800 text-right">${period}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5 hidden">
                    <div class="text-slate-500 font-semibold">Biaya per Bulan</div>
                    <div class="font-bold text-indigo-700 text-right">${costStr}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">Processor</div>
                    <div class="font-bold text-slate-800 text-right">${item.processor || '-'}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">RAM / Storage</div>
                    <div class="font-bold text-slate-800 text-right">${item.ram || '-'} / ${item.storage || '-'}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">Sistem Operasi</div>
                    <div class="font-bold text-slate-800 text-right">${item.os || '-'}</div>
                </div>
                <div class="flex justify-between items-center text-xs border-b border-slate-100 pb-1.5">
                    <div class="text-slate-500 font-semibold">Microsoft Office</div>
                    <div class="font-bold text-slate-800 text-right">${item.office || '-'}</div>
                </div>
                <div class="flex justify-between items-center text-xs pt-1">
                    <div class="text-slate-500 font-semibold">Status Aset</div>
                    <div class="font-bold ${item.status === 'Available' ? 'text-emerald-600' : 'text-amber-600'} text-right bg-slate-50 px-2 py-0.5 rounded">${item.status}</div>
                </div>
            </div>
        `;
        
        document.getElementById('rental-spec-modal').classList.remove('hidden');
    }

    function closeRentalSpecModal() {
        document.getElementById('rental-spec-modal').classList.add('hidden');
    }
</script>
