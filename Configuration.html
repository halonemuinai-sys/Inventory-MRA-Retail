<!-- CONFIGURATION & OTHERS -->
<section id="configuration" class="page-section hidden">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div id="config-users-card" class="md:col-span-2"></div>
        <div class="config-card">
            <div class="flex items-center gap-2 mb-2"><i class="fa-regular fa-bell text-slate-500"></i>
                <h3 class="font-bold text-slate-800">Notifikasi Sewa</h3>
            </div>
            <label class="text-xs text-slate-500 font-semibold mb-1 block">Ambang Batas Peringatan (Hari)</label>
            <input type="number" id="config-rental-warning"
                class="w-full p-2 border border-slate-200 rounded text-sm mb-1 outline-none focus:border-brand-500"
                placeholder="30" onchange="saveConfig('RentalWarning', this.value)">
            <p class="text-[10px] text-slate-400">Sistem akan memberi warning jika masa sewa berakhir dalam X hari.</p>
        </div>
        <div id="config-admin-card"></div>
        <div id="config-vendor-card"></div>


        <div id="config-processor-card"></div>
        <div id="config-ram-card"></div>
        <div id="config-storage-card"></div>
        <div id="config-os-card"></div>
        <div id="config-office-card"></div>
        <div id="config-company-card"></div>
        <div id="config-dept-card"></div>
        <div id="config-software-card"></div>
        <div id="config-hd-category-card"></div>
        <div id="config-hd-source-card"></div>
        <div id="config-hd-impact-card"></div>
    </div>
</section>
