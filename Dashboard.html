<!-- DASHBOARD VIEW -->
<section id="dashboard" class="page-section space-y-6 animate-fade-in">
    <div id="dashboard-rental-container" class="hidden w-full mb-6">
        <h3 id="dashboard-warning-title" class="font-bold text-slate-700 text-sm mb-3 flex items-center gap-2 px-1">
            <i class="fa-solid fa-triangle-exclamation text-orange-500"></i> Masa Sewa Hampir Habis
        </h3>
        <div id="rental-warning-list" class="flex overflow-x-auto gap-4 pb-2 scrollbar-hide">
            <!-- Cards injected here -->
        </div>
    </div>
    <div class="flex justify-end">
        <div class="bg-white border border-slate-200 rounded-lg flex items-center px-3 py-1 shadow-sm"><span
                class="text-xs font-bold text-slate-500 mr-2">Periode:</span><select id="dash-year-select" title="Tahun Periode"
                onchange="changeGlobalYear(this.value)"
                class="text-sm font-bold text-brand-700 bg-transparent outline-none cursor-pointer"></select></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6">
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Laptop Baru Sewa</p>
                <h3 class="text-2xl font-bold text-brand-600" id="dash-new-laptop-sewa">0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center"><i
                    class="fa-solid fa-laptop-medical"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Total Unit Sewa</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-total-sewa">0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center"><i
                    class="fa-regular fa-clock"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Total Aset Kantor</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-total-kantor">0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center"><i
                    class="fa-solid fa-building"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Stok Tersedia</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-available">0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center"><i
                    class="fa-solid fa-check"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Tiket Open</p>
                <h3 class="text-2xl font-bold text-slate-800" id="dash-tickets">0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-red-50 text-red-500 flex items-center justify-center"><i
                    class="fa-regular fa-comment-dots"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-slate-500 text-xs font-semibold mb-1">Biaya Sewa (YTD)</p>
                <h3 class="text-xl font-bold text-slate-800" id="dash-cost">Rp 0</h3>
            </div>
            <div class="w-10 h-10 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center"><i
                    class="fa-solid fa-wallet"></i></div>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
        <h4 class="font-bold text-slate-700 text-sm mb-6 flex items-center gap-2"><i
                class="fa-solid fa-chart-area text-brand-600"></i> Analisa Biaya & Jumlah Aset Sewa</h4>
        <div class="relative h-80 w-full"><canvas id="chart-combined"></canvas></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 text-sm"><i
                    class="fa-solid fa-arrow-trend-up text-brand-600"></i> Aktivitas Terbaru</h3>
            <div id="dash-activities" class="space-y-4"></div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2 text-sm"><i
                    class="fa-solid fa-coins text-brand-600"></i> Top Pengeluaran</h3>
            <div id="dash-cost-list" class="space-y-6"></div>
        </div>
    </div>
</section>
