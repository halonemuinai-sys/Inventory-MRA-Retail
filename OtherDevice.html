<!-- OTHER DEVICE VIEW -->
<section id="other-device" class="page-section hidden">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Form Input -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sticky top-24">
                <div class="flex items-center gap-3 mb-6 border-b border-slate-100 pb-4">
                    <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
                        <i class="fa-solid fa-server text-lg"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-800">Input Other Device</h3>
                        <p class="text-xs text-slate-500">CCTV, Printer, Network, dll.</p>
                    </div>
                </div>

                <form id="other-device-form" onsubmit="handleOtherDeviceSubmit(event)" class="space-y-4">
                    <input type="hidden" name="id" id="other-device-id">

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Unit Bisnis</label>
                        <select name="company" id="form-other-company" title="Unit Bisnis"
                            class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none"
                            required>
                            <option value="" disabled selected>-- Pilih Unit Bisnis --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Kategori Perangkat</label>
                        <select name="category" id="form-other-category" title="Kategori Perangkat"
                            class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none"
                            required>
                            <option value="" disabled selected>-- Pilih Kategori --</option>
                            <option value="Camera CCTV">Camera CCTV</option>
                            <option value="NVR">NVR</option>
                            <option value="Printer">Printer</option>
                            <option value="Network Device">Network Device</option>
                            <option value="Server">Server</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Brand</label>
                            <input type="text" name="brand" list="brand-list"
                                class="w-full p-3 bg-slate-50 border-none rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                                placeholder="Hikvision, HP..." required>
                            <datalist id="brand-list"></datalist>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Model</label>
                            <input type="text" name="model"
                                class="w-full p-3 bg-slate-50 border-none rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                                placeholder="Model..." required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Serial Number</label>
                        <input type="text" name="serial"
                            class="w-full p-3 bg-slate-50 border-none rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-medium"
                            placeholder="S/N...">
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Qty (Jumlah)</label>
                        <input type="number" name="qty" id="form-other-qty" min="1" value="1" title="Qty"
                            class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none font-mono"
                            required>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Tanggal Beli</label>
                            <input type="date" name="purchaseDate" id="form-other-date" title="Tanggal Beli"
                                class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Harga Beli (Rp)</label>
                            <input type="text" name="purchasePrice" id="form-other-price" onkeyup="formatCurrency(this)"
                                class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none font-mono"
                                placeholder="0">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Lokasi</label>
                        <select name="location" id="form-other-location" title="Lokasi"
                            class="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm outline-none">
                            <option value="" selected>-- Pilih Lokasi --</option>
                        </select>
                    </div>
                    <!-- Hidden defaults -->
                    <input type="hidden" name="type" value="Beli">
                    <input type="hidden" name="status" value="Available">

                    <button type="submit"
                        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold text-sm shadow-lg shadow-indigo-200 transition-all transform active:scale-95 flex items-center justify-center gap-2">
                        <i class="fa-regular fa-floppy-disk"></i> Simpan Data
                    </button>

                    <button type="button" onclick="resetOtherDeviceForm()"
                        class="w-full py-2 text-slate-400 hover:text-slate-600 text-xs font-semibold transition-colors">
                        Reset Form
                    </button>
                </form>
            </div>
        </div>

        <!-- Table View -->
        <div class="lg:col-span-2">
            <div
                class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-8rem)]">
                <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-sm">Daftar Other Device</h3>
                    <input type="text" id="other-device-search" onkeyup="renderOtherDeviceTable()" placeholder="Cari..."
                        class="px-3 py-1.5 text-xs border border-slate-300 rounded-lg outline-none focus:border-indigo-500 w-48">
                </div>
                <div class="overflow-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead
                            class="bg-slate-50 sticky top-0 z-10 text-[10px] font-bold text-slate-500 uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-3 border-b border-slate-100">Device Info</th>
                                <th class="px-6 py-3 border-b border-slate-100 text-center">Qty</th>
                                <th class="px-6 py-3 border-b border-slate-100">Category</th>
                                <th class="px-6 py-3 border-b border-slate-100">Location</th>
                                <th class="px-6 py-3 border-b border-slate-100 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="other-device-table-body" class="divide-y divide-slate-100">
                            <!-- JS Populated -->
                        </tbody>
                    </table>
                    <!-- Empty State -->
                    <div id="other-device-empty-msg"
                        class="hidden flex flex-col items-center justify-center py-12 text-center">
                        <div
                            class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-3">
                            <i class="fa-solid fa-server text-2xl"></i>
                        </div>
                        <p class="text-slate-500 text-sm font-medium">Belum ada data device lain.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
