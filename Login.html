<!-- LOGIN SCREEN -->
<div id="login-container" class="fixed inset-0 z-50 bg-[#1e1e2e] flex items-center justify-center font-sans">
    <div class="bg-[#262636] p-8 rounded-xl shadow-2xl w-full max-w-sm border border-[#353545]">
        <div class="text-center mb-8">
            <div
                class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-600/30">
                <i class="fa-solid fa-server text-white text-xl"></i>
            </div>
            <h1 class="text-white font-bold text-xl mb-1 tracking-tight">Asset & Lease<br>Management MRA Retail</h1>
            <p class="text-slate-400 text-xs">Masuk untuk manajemen sistem</p>
        </div>

        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label
                    class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-500 text-xs"></i>
                    </div>
                    <input type="text" id="login-username"
                        class="w-full bg-[#1b1b26] text-white text-sm rounded-lg pl-9 pr-4 py-3 border border-[#353545] focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600"
                        placeholder="Masukkan username" required autocomplete="off">
                </div>
            </div>

            <div>
                <label
                    class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-500 text-xs"></i>
                    </div>
                    <input type="password" id="login-password"
                        class="w-full bg-[#1b1b26] text-white text-sm rounded-lg pl-9 pr-4 py-3 border border-[#353545] focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600"
                        placeholder="Masukkan password" required>
                </div>
            </div>

            <button type="submit" id="btn-login"
                class="w-full bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-600/20 transition-all text-sm flex justify-center items-center gap-2 group">
                <span>Masuk Sistem</span>
                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform text-xs"></i>
            </button>

            <p id="login-error"
                class="text-red-500 text-xs text-center mt-4 hidden bg-red-500/10 py-2 rounded border border-red-500/20">
            </p>

            <div class="text-center mt-6">
                <p class="text-[10px] text-slate-600">&copy; 2026 Asset Management System</p>
            </div>
        </form>
    </div>
</div>
