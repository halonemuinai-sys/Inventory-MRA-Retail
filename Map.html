<!-- GIS VIEW -->
<section id="gis" class="page-section hidden h-full w-full relative">
    <style>

        .btn-maps {

        /* ANIMATIONS */
        .pulse {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            height: 14px;
            width: 14px;
            position: absolute;
            left: 50%;
            top: 50%;
            margin: 11px 0px 0px -12px;
            transform: rotateX(55deg);

        .pulse:after {
            content: "";
            border-radius: 50%;
            height: 40px;
            width: 40px;
            position: absolute;

        @keyframes pulsate {

        #gis #toggleBtn {

    <div class="map-wrapper">
        <div id="loader-gis">
            <i class="fas fa-globe-asia fa-3x"></i>
            <div class="loader-text">INITIALIZING SYSTEM</div>
        </div>

        <button id="toggleBtn" onclick="toggleGISSidebar()"><i class="fas fa-bars"></i></button>

        <div class="sidebar-card" id="gis-sidebar">
            <div class="sidebar-header">
                <h1>GIS DASHBOARD</h1>
                <div class="subtitle" id="locationCountSubtitle">LOADING DATA...</div>
            </div>

            <div class="sidebar-content">
                <div class="filter-box">
                    <label class="filter-box-label">Select Brand</label>
                    <div class="custom-dropdown" id="brandDropdown">
                        <div class="dropdown-selected" onclick="toggleGISDropdown()">
                            <span id="selectedBrandText">All Locations</span>
                            <i class="fas fa-chevron-down dropdown-icon"></i>
                        </div>
                        <div class="dropdown-options" id="dropdownOptions">
                            <!-- JS Injected -->
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-val" id="totalPCLaptop">0</div>
                        <div class="stat-label"><i class="fas fa-laptop"></i> PC & LAPTOP</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val" id="totalNetwork">0</div>
                        <div class="stat-label"><i class="fas fa-network-wired"></i> NET DEVICES</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val" id="totalCCTV">0</div>
                        <div class="stat-label"><i class="fas fa-video"></i> CCTV CAM</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val" id="totalNVR">0</div>
                        <div class="stat-label"><i class="fas fa-hdd"></i> NVR SYSTEM</div>
                    </div>
                    <div class="stat-card span-2">
                        <div class="stat-val" id="totalPrinter">0</div>
                        <div class="stat-label"><i class="fas fa-print"></i> PRINTERS</div>
                    </div>
                </div>

                <div class="list-header">Detected Locations</div>
                <div id="storeListContainer"></div>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <script>
        let gisMap;
        let gisMarkersLayer;
        let gisData = [];
        let gisMarkersMap = {};
        let gisInitialized = false;

        function initGISMap() {
            // Wait for dependencies if necessary (Leaflet)
            if (typeof L === 'undefined') {
                setTimeout(initGISMap, 500);
                return;
            }

            if (gisInitialized) {
                if (gisMap) setTimeout(() => gisMap.invalidateSize(), 200);
                return;
            }

            gisMap = L.map('map', { zoomControl: false, attributionControl: false }).setView([-2.5489, 118.0149], 5);
            L.control.zoom({ position: 'bottomright' }).addTo(gisMap);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd' }).addTo(gisMap);
            gisMarkersLayer = L.layerGroup().addTo(gisMap);

            gisInitialized = true;

            // Auto Load on init
            loadStoreData();
        }

        function loadStoreData() {
            const loader = document.getElementById('loader-gis');
            if (loader) loader.style.display = 'flex';

            if (typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(processGISData)
                    .withFailureHandler(handleGISError)
                    .getStoreData();
            } else {
                console.log("Dev Mode: Apps Script not found. Loading Mock Data.");
                // Use mock data if strictly needed or just stay blank/error
                handleGISError({ message: "Environment Apps Script not active." });
            }
        }

        function handleGISError(err) {
            const loader = document.getElementById('loader-gis');
            if (loader) loader.innerHTML = `<div style="color:#ef4444; text-align:center; padding:20px;"><i class="fas fa-exclamation-triangle fa-2x"></i><br><br>${err.message}</div>`;
        }

        function processGISData(data) {
            const loader = document.getElementById('loader-gis');
            // Fade out loader
            if (loader) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.5s';
                setTimeout(() => loader.style.display = 'none', 500);
            }

            if (!data || data.length === 0) {
                document.getElementById('locationCountSubtitle').innerText = "NO DATA FOUND";
                return;
            }

            gisData = data;
            populateGISFilter();
            renderGISData(gisData);
        }

        function renderGISData(data) {
            gisMarkersLayer.clearLayers();
            gisMarkersMap = {};
            const listContainer = document.getElementById('storeListContainer');
            listContainer.innerHTML = '';

            let stats = { pc_laptop: 0, cctv: 0, nvr: 0, jml_network: 0, printer: 0, count: 0 };

            data.forEach((store, index) => {
                // Ensure Lat/Lng parsing
                const lat = parseFloat(store.lat);
                const lng = parseFloat(store.lng);

                if (isNaN(lat) || isNaN(lng)) return;

                const laptops = parseInt(store.pc_laptop) || 0;
                const cams = parseInt(store.cctv) || 0;
                const nvrs = parseInt(store.nvr) || 0;
                const nets = (parseInt(store.jml_network) || 0);
                const printers = parseInt(store.printer) || 0;
                const netName = store.network_desc || (store.jml_network ? 'Network Device' : '-');

                stats.pc_laptop += laptops;
                stats.cctv += cams;
                stats.nvr += nvrs;
                stats.jml_network += nets;
                stats.printer += printers;
                stats.count++;

                // MARKER CREATION
                let color = '#3b82f6';
                let iconClass = 'fa-building';
                if (store.brand === 'Bvlgari') { color = '#d4af37'; iconClass = 'fa-gem'; }
                if (store.brand === 'Omega') { color = '#ef4444'; iconClass = 'fa-stopwatch'; }

                const iconHtml = `
                    <div style="background-color: ${color}; width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">
                    <i class="fas ${iconClass}" style="color: #fff; font-size: 12px; transform: rotate(45deg);"></i>
                    </div>
                    <div class="pulse"></div>
                `;

                const customIcon = L.divIcon({ className: 'custom-marker', html: iconHtml, iconSize: [30, 42], iconAnchor: [15, 42], popupAnchor: [0, -40] });
                const storeImage = store.image || 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=600&auto=format&fit=crop';

                const popupContent = `
                    <img src="${storeImage}" class="popup-image" alt="${store.location}">
                    <div class="popup-details">
                    <div class="popup-header-styled">
                        <div class="popup-brand">${store.brand}</div>
                        <div class="popup-title">${store.location}</div>
                    </div>
                    <table class="popup-table" style="width:100%">
                        <tr><td><i class="fas fa-wifi"></i> Connection</td><td>${store.koneksi}</td></tr>
                        <tr><td><i class="fas fa-desktop"></i> PC & LAPTOP</td><td>${laptops} Units</td></tr>
                        <tr><td><i class="fas fa-server"></i> NET DEVICES</td><td>${nets} (${netName})</td></tr>
                        <tr><td><i class="fas fa-video"></i> CCTV CAM</td><td>${cams} Units</td></tr>
                        <tr><td><i class="fas fa-hdd"></i> NVR SYSTEM</td><td>${nvrs} Units</td></tr>
                        <tr><td><i class="fas fa-print"></i> PRINTERS</td><td>${printers} Units</td></tr>
                    </table>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank" class="btn-maps">NAVIGATE TO SITE</a>
                    </div>
                `;

                const marker = L.marker([lat, lng], { icon: customIcon }).bindPopup(popupContent);
                gisMarkersLayer.addLayer(marker);
                gisMarkersMap[store.location] = marker; // Use Name or Unique ID as key

                // LIST ITEM
                const listItem = document.createElement('div');
                listItem.className = 'store-item';
                listItem.innerHTML = `
                    <div class="store-info">
                    <h4 style="color:${color}">${store.location}</h4>
                    <p>${store.brand} • ${netName}</p>
                    </div>
                    <div class="status-dot" title="Online"></div>
                `;
                listItem.onclick = () => {
                    gisMap.flyTo([lat, lng], 17, { duration: 1.5 });
                    marker.openPopup();
                    if (window.innerWidth < 768) toggleGISSidebar();
                };
                listContainer.appendChild(listItem);
            });

            updateGISStats(stats);
        }

        function updateGISStats(stats) {
            if (document.getElementById('totalPCLaptop')) document.getElementById('totalPCLaptop').innerText = stats.pc_laptop;
            if (document.getElementById('totalNetwork')) document.getElementById('totalNetwork').innerText = stats.jml_network;
            if (document.getElementById('totalCCTV')) document.getElementById('totalCCTV').innerText = stats.cctv;
            if (document.getElementById('totalNVR')) document.getElementById('totalNVR').innerText = stats.nvr;
            if (document.getElementById('totalPrinter')) document.getElementById('totalPrinter').innerText = stats.printer;
            if (document.getElementById('locationCountSubtitle')) document.getElementById('locationCountSubtitle').innerText = stats.count + " LOCATIONS ONLINE";
        }

        function populateGISFilter() {
            const brands = [...new Set(gisData.map(d => d.brand))];
            const optionsContainer = document.getElementById('dropdownOptions');
            optionsContainer.innerHTML = '';
            addGISDropdownOption('All Locations', 'All');
            brands.sort().forEach(b => { addGISDropdownOption(b, b); });
        }

        function addGISDropdownOption(text, value) {
            const container = document.getElementById('dropdownOptions');
            const div = document.createElement('div');
            div.className = 'dropdown-item';
            let iconHtml = '';
            if (value === 'Bvlgari') iconHtml = '<i class="fas fa-gem"></i>';
            else if (value === 'Omega') iconHtml = '<i class="fas fa-stopwatch"></i>';
            else if (value === 'All') iconHtml = '<i class="fas fa-globe"></i>';

            div.innerHTML = `<span>${text}</span> ${iconHtml}`;
            div.onclick = () => selectGISBrand(value, text);
            container.appendChild(div);
        }

        function toggleGISDropdown() {
            document.getElementById('brandDropdown').classList.toggle('open');
        }

        function selectGISBrand(value, text) {
            document.getElementById('selectedBrandText').innerText = text;
            toggleGISDropdown();

            const items = document.querySelectorAll('.dropdown-item');
            items.forEach(item => {
                if (item.innerText.includes(text)) item.classList.add('active');
                else item.classList.remove('active');
            });

            const filtered = (value === 'All') ? gisData : gisData.filter(d => d.brand === value);
            renderGISData(filtered);
        }

        function toggleGISSidebar() {
            document.getElementById('gis-sidebar').classList.toggle('active');
        }

        // Add event listener to close dropdown when clicking outside
        document.addEventListener('click', function (e) {
            const dropdown = document.getElementById('brandDropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                dropdown.classList.remove('open');
            }
        });
    </script>
</section>
