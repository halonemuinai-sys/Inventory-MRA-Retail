<!-- EMPLOYEES VIEW -->
<section id="employees" class="page-section hidden">
    <div class="flex flex-col lg:flex-row gap-6 items-start h-full">
        <div class="w-full lg:w-[350px] flex-shrink-0">
            <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5 sticky top-0">
                <h3 class="text-lg font-bold text-brand-700 mb-4">Onboarding Karyawan</h3>
                <form id="employee-form" onsubmit="handleEmployeeSubmit(event)" class="space-y-3">
                    <div><select name="company" id="emp-form-company" title="Unit Bisnis"
                            class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none"
                            required onchange="populateOnboardingAssets()">
                            <option value="" disabled selected>-- Unit Bisnis --</option>
                        </select></div>
                    <input type="text" name="name" placeholder="Nama Lengkap"
                        class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none" required>
                    <input type="text" name="role" placeholder="Jabatan"
                        class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none" required>
                    <div><select name="department" id="form-dept" title="Departemen"
                            class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none"
                            required>
                            <option value="" disabled selected>-- Departemen --</option>
                        </select></div>
                    <input type="email" name="email" placeholder="Email Kantor"
                        class="w-full p-2.5 bg-white border border-slate-300 rounded-lg text-sm outline-none">

                    <button type="submit"
                        class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white font-bold text-sm rounded-lg shadow-md shadow-brand-600/20 transition-all mt-4">Simpan
                        Data Karyawan</button>
                </form>
            </div>
        </div>
        <div class="flex-1 min-w-0">
            <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden min-h-[600px]">
                <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700">Daftar Karyawan <span id="emp-list-label"
                            class="text-xs font-normal text-slate-400 ml-2">(Global)</span></h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="py-3 px-5 text-xs font-bold text-slate-500 uppercase">Nama</th>
                                <th class="py-3 px-5 text-xs font-bold text-slate-500 uppercase">Unit Bisnis</th>
                                <th class="py-3 px-5 text-xs font-bold text-slate-500 uppercase">Role</th>
                                <th class="py-3 px-5 text-xs font-bold text-slate-500 uppercase">Aset</th>
                                <th class="py-3 px-5 text-xs font-bold text-slate-500 uppercase text-right">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="employee-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- ASSET ASSIGNMENT MODAL -->
    <div id="assign-asset-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 transform transition-all scale-100">
            <h3 class="text-lg font-bold text-slate-800 mb-4">Assign Aset ke Karyawan</h3>
            <p class="text-sm text-slate-500 mb-4" id="assign-modal-subtitle">Pilih aset untuk assigned...</p>

            <form onsubmit="handleAssignSubmit(event)" class="space-y-4">
                <input type="hidden" id="assign-emp-id">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1">Pilih Aset Tersedia</label>
                    <select id="assign-asset-select" title="Pilih Aset"
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-brand-500"
                        required>
                        <option value="" disabled selected>-- Memuat Aset... --</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button"
                        onclick="document.getElementById('assign-asset-modal').classList.add('hidden')"
                        class="px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 text-sm font-bold text-white bg-brand-600 hover:bg-brand-700 rounded-lg shadow-md shadow-brand-600/20">Assign
                        Aset</button>
                </div>
            </form>
        </div>
    </div>
</section>
